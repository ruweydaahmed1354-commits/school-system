<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>AL Suhaim University | My Classes</title>
  <link rel='stylesheet' href='./my-classes.css' />
</head>
<body>
  <div class='app'>
    <aside class='sidebar'>
      <div class='brand'>
        <div>
          <h1>AL Suhaim University</h1>
          <p>Lecturer Portal</p>
        </div>
      </div>
      <nav class='menu'>
        <a class='nav-link ' href='./dashboard.html'>Dashboard</a>
          <a class='nav-link active' href='./my-classes.html'>My Classes</a>
          <a class='nav-link ' href='./attendance.html'>Attendance</a>
          <a class='nav-link ' href='./gradebook.html'>Gradebook</a>
          <a class='nav-link ' href='./timetable.html'>Timetable</a>
          <a class='nav-link ' href='./announcements.html'>Announcements</a>
      </nav>
      <a class='logout' href='../auth/login.html'>Log out</a>
    </aside>

    <main class='content'>
      <header class='topbar'>
        <h2>My Classes</h2>
        <img class='logo-img' src='../assets/magnific_3d-logo-for-alsuhaim-univ_mCTBzm9hJQ.png' alt='AL Suhaim University Logo' />
      </header>

      <section class='cards'>
        <article class='card'>
          <h3 id='lecturerName'>Lecturer</h3>
          <p id='lecturerFaculty'>Faculty</p>
        </article>
        <article class='card'>
          <h3 id='totalAllocated'>0</h3>
          <p>Allocated units</p>
        </article>
        <article class='card'>
          <h3 id='availableUnits'>0</h3>
          <p>Available faculty units</p>
        </article>
      </section>

      <section class='form-wrap'>
        <form id='allocateForm' class='form-grid'>
          <select id='unitCode' required></select>
          <button class='action-btn' type='submit'>Register Unit to Teach</button>
        </form>
      </section>

      <section class='table-wrap'>
        <table>
          <thead>
            <tr>
              <th>Unit Code</th>
              <th>Unit Name</th>
              <th>Day</th>
              <th>Time</th>
              <th>Venue</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id='dataRows'></tbody>
        </table>
      </section>
    </main>
  </div>

  <script src='../assets/portal-ui.js'></script>
  <script src='./my-classes.js'></script>
</body>
</html>
