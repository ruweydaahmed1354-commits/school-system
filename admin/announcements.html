<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>AL Suhaim University | Announcements</title>
  <link rel='stylesheet' href='./dashboard.css' />
</head>
<body>
  <div class='app'>
    <aside class='sidebar'>
      <div class='brand'>
        <div>
          <h1>AL Suhaim University</h1>
          <p>Admin Portal</p>
        </div>
      </div>
      <nav class='menu'>
        <a class='nav-link' href='./dashboard.html'>Dashboard</a>
        <a class='nav-link' href='./students.html'>Students</a>
        <a class='nav-link' href='./lecturers.html'>Lecturers</a>
        <a class='nav-link' href='./classes.html'>Classes</a>
        <a class='nav-link' href='./attendance.html'>Attendance</a>
        <a class='nav-link' href='./grades.html'>Grades</a>
        <a class='nav-link' href='./fees.html'>Fees</a>
                  <a class='nav-link ' href='./accommodation.html'>Accommodation</a>
<a class='nav-link' href='./reports.html'>Reports</a>
        <a class='nav-link active' href='./announcements.html'>Announcements</a>
        <a class='nav-link' href='./settings.html'>Settings</a>
      </nav>
      <a class='logout' href='../auth/login.html'>Log out</a>
    </aside>

    <main class='content'>
      <header class='topbar'>
        <h2>Announcements</h2>
        <img class='logo-img' src='../assets/magnific_3d-logo-for-alsuhaim-univ_mCTBzm9hJQ.png' alt='AL Suhaim University Logo' />
      </header>

      <section class='cards'>
        <article class='card'>
          <h3 id='totalAnnouncements'>0</h3>
          <p>Total announcements</p>
        </article>
        <article class='card'>
          <h3 id='publicAnnouncements'>0</h3>
          <p>Public announcements</p>
        </article>
        <article class='card'>
          <h3 id='recentAnnouncements'>0</h3>
          <p>Posted this week</p>
        </article>
      </section>

      <section class='form-wrap'>
        <form id='announcementForm' class='form-grid'>
          <input id='title' placeholder='Announcement Title' required />
          <select id='audience' required>
            <option value='all'>All Users</option>
            <option value='students'>Students Only</option>
            <option value='lecturers'>Lecturers Only</option>
          </select>
          <textarea id='body' placeholder='Announcement message...' rows='3' required></textarea>
          <button class='action-btn' type='submit'>Post Announcement</button>
        </form>
      </section>

      <section class='table-wrap'>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Audience</th>
              <th>Posted By</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id='dataRows'></tbody>
        </table>
      </section>
    </main>
  </div>

  <script src='../assets/portal-data.js'></script>
  <script src='../assets/portal-ui.js'></script>
  <script src='./announcements.js'></script>
</body>
</html>
