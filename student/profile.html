<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>AL Suhaim University | Profile</title>
  <link rel='stylesheet' href='./profile.css' />
</head>
<body>
  <div class='app'>
    <aside class='sidebar'>
      <div class='brand'>
        <div>
          <h1>AL Suhaim University</h1>
          <p>Student Portal</p>
        </div>
      </div>
      <nav class='menu'>
        <a class='nav-link' href='./dashboard.html'>Dashboard</a>
        <a class='nav-link active' href='./profile.html'>Profile</a>
        <a class='nav-link' href='./results.html'>Results</a>
        <a class='nav-link' href='./attendance.html'>Attendance</a>
        <a class='nav-link' href='./fees.html'>Fees</a>
                <a class='nav-link' href='./accommodation.html'>Accommodation</a>
<a class='nav-link' href='./timetable.html'>Timetable</a>
        <a class='nav-link' href='./units.html'>Units Registration</a>
        <a class='nav-link' href='./announcements.html'>Announcements</a>
      </nav>
      <a class='logout' href='../auth/login.html'>Log out</a>
    </aside>

    <main class='content'>
      <header class='topbar'>
        <h2>Student Profile</h2>
        <img class='logo-img' src='../assets/magnific_3d-logo-for-alsuhaim-univ_mCTBzm9hJQ.png' alt='AL Suhaim University Logo' />
      </header>

      <section class='form-wrap'>
        <form id='profileForm'>
          <div class='photo-block'>
            <img id='profilePhotoPreview' class='profile-photo' src='../assets/magnific_3d-logo-for-alsuhaim-univ_mCTBzm9hJQ.png' alt='Profile photo preview' />
            <div class='form-field'>
              <label for='photoInput'>Upload Photo</label>
              <input id='photoInput' type='file' accept='image/*' />
            </div>
          </div>
          <div class='form-grid'>
            <div class='form-field'><label for='name'>Full Name</label><input id='name' required /></div>
            <div class='form-field'><label for='registrationNo'>Registration Number</label><input id='registrationNo' required /></div>
            <div class='form-field'><label for='program'>Course/Program</label><input id='program' placeholder='e.g. BScS' required /></div>
            <div class='form-field'><label for='year'>Academic Year</label><input id='year' required /></div>
            <div class='form-field'><label for='faculty'>Faculty</label><input id='faculty' /></div>
            <div class='form-field'><label for='email'>Email</label><input id='email' type='email' /></div>
            <div class='form-field'><label for='phone'>Phone</label><input id='phone' /></div>
            <div class='form-field'><label for='gender'>Gender</label><select id='gender'><option>Male</option><option>Female</option><option>Prefer not to say</option></select></div>
            <div class='form-field'><label for='dob'>Date of Birth</label><input id='dob' type='date' /></div>
            <div class='form-field'><label for='admissionDate'>Admission Date</label><input id='admissionDate' type='date' /></div>
            <div class='form-field'><label for='sponsor'>Sponsor</label><input id='sponsor' /></div>
            <div class='form-field full'><label for='bio'>Bio</label><textarea id='bio' placeholder='Write a short profile summary...'></textarea></div>
          </div>
          <div class='action-row'>
            <button class='action-btn' type='submit'>Save Profile</button>
            <span id='profileNotice' class='notice'>Saved profile appears in your dashboard header.</span>
          </div>
        </form>
      </section>

    </main>
  </div>

  <script src='./portal-data.js'></script>
  <script src='./student-header.js'></script>
  <script src='./profile.js'></script>
</body>
</html>
