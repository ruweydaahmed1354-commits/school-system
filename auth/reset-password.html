<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AL Suhaim University | Set new password</title>
  <link rel="stylesheet" href="./forgot-password.css" />
</head>
<body>
  <main class="auth">
    <section class="panel">
      <div class="branding">
        <img class="logo-img" src="../assets/magnific_3d-logo-for-alsuhaim-univ_mCTBzm9hJQ.png" alt="AL Suhaim University Logo" />
        <h1>Set a new password</h1>
      </div>
      <p>Choose a new password for your account.</p>
      <form id="newPasswordForm">
        <label for="newPassword">New password</label>
        <input id="newPassword" type="password" minlength="8" autocomplete="new-password" required />
        <label for="confirmPassword">Confirm new password</label>
        <input id="confirmPassword" type="password" minlength="8" autocomplete="new-password" required />
        <button type="submit">Update password</button>
      </form>
      <p id="message" aria-live="polite"></p>
      <p class="auth-switch"><a href="./login.html">Return to login</a></p>
    </section>
  </main>
  <script src="./reset-password.js"></script>
</body>
</html>
