<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>AL Suhaim University | Forgot Password</title>
  <link rel='stylesheet' href='./forgot-password.css' />
</head>
<body>
  <main class='auth'>
    <section class='panel'>
      <div class='branding'>
        <img class='logo-img' src='../assets/magnific_3d-logo-for-alsuhaim-univ_mCTBzm9hJQ.png' alt='AL Suhaim University Logo' />
        <h1>Forgot Password</h1>
      </div>
      
      <form id='resetForm'>
        <label for='email'>Email Address</label>
        <input id='email' type='email' placeholder='Enter your registered email' required />
        
        <button type='submit'>Request Reset</button>
        <p id='message' class='message'></p>
      </form>
      
      <p class='auth-switch'><a href='./login.html'>Back to Login</a></p>
      
      <p style='margin-top: 1rem; color: #64748b; font-size: 0.9rem;'>For immediate assistance, contact ICT support at ict@alsuhaim.edu</p>
    </section>
  </main>
  <script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script>
  <script src='../assets/supabase-client.js'></script>
  <script src='./forgot-password.js'></script>
</body>
</html>
